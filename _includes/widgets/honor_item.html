{% assign item = include.item %}
<div class="d-none d-md-block">
    <div class="row no-gutters {% unless include.hide_bottom_border %}border-bottom{% endunless %} border-gray">
        <div class="col-12 p-3">
            <h5 class="mt-0 mb-1 font-weight-normal">
                {% if item.certificate %}
                <a href="{{ item.certificate | relative_url }}" target="_blank">{{ item.title }}</a>
                {% else %}
                {{ item.title }}
                {% endif %}
            </h5>
            <p class="mt-0 mb-0 small text-muted">{{ item.date | date: '%Y-%m-%d' }}</p>
        </div>
    </div>
</div>

<div class="row no-gutters d-md-none {% unless include.hide_bottom_border %}border-bottom{% endunless %} border-gray {% if include.first %}rounded-xl-top{% endif %} {% if include.last %}rounded-xl-bottom{% endif %}">
    <div class="w-100 {% if include.first %}rounded-xl-top{% endif %} {% if include.last %}rounded-xl-bottom{% endif %}">
        <div class="py-2 px-4">
            <h5 class="mt-0 mb-1 font-weight-normal">
                {% if item.certificate %}
                <a href="{{ item.certificate | relative_url }}" target="_blank">{{ item.title }}</a>
                {% else %}
                {{ item.title }}
                {% endif %}
            </h5>
            <p class="mt-0 mb-0 small text-muted">{{ item.date | date: '%Y-%m-%d' }}</p>
        </div>
    </div>
</div>
